<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Human Design Blueprint • Soulbound NFT</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --accent: #00ffaa;
      --text: #f0f0f0;
      --text-light: #aaaaaa;
      --border: #333;
      --design-red: #ff6666;
      --personality-blue: #6666ff;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      line-height: 1.6;
    }
    
    .container { max-width: 1280px; margin: 0 auto; }
    
    h1 { text-align: center; font-size: 3.2rem; margin-bottom: 8px; letter-spacing: -2px; font-weight: 700; }
    .subtitle { text-align: center; color: var(--text-light); margin-bottom: 50px; font-size: 1.15rem; }
    
    .card {
      background: var(--card);
      padding: 40px;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      margin-bottom: 40px;
      border: 1px solid var(--border);
    }
    
    input, select {
      width: 100%;
      padding: 18px;
      margin-bottom: 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #111;
      color: white;
      font-size: 1.15rem;
    }
    
    button {
      padding: 20px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 700;
      width: 100%;
      transition: all 0.3s ease;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,170,0.4); }
    
    table { width: 100%; border-collapse: collapse; margin: 24px 0 40px 0; }
    th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1f1f1f; font-weight: 600; width: 160px; }
    
    /* Planetary Layout - Responsive */
    .planetary-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      margin: 50px 0;
    }
    .planetary-side { flex: 1; }
    .planetary-side h3 { font-size: 1.4rem; margin-bottom: 24px; letter-spacing: -0.5px; }
    
    .planet-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 16px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.03);
    }
    .planet-item:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
    .planet-item .symbol { font-size: 32px; width: 40px; text-align: center; }
    .planet-item strong { font-size: 1.1rem; min-width: 110px; }
    
    img {
      max-width: 100%;
      border-radius: 24px;
      background: #111;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
    
    .result { display: none; }
    
    details { margin: 20px 0; background: #111; border-radius: 18px; overflow: hidden; border: 1px solid #222; }
    summary { padding: 18px 24px; font-weight: 600; cursor: pointer; background: #1a1a1a; }
    pre { background: #0a0a0a; padding: 24px; border-radius: 14px; overflow-x: auto; font-size: 13.5px; line-height: 1.5; }
    
    .buttons { display: flex; gap: 16px; margin-top: 50px; }
    .buttons button { flex: 1; font-size: 1.15rem; padding: 22px; }
    
    /* Mobile Responsiveness */
    @media (max-width: 960px) {
      .planetary-container { flex-direction: column; gap: 40px; }
      h1 { font-size: 2.6rem; }
      .card { padding: 28px; }
    }
    
    @media (max-width: 600px) {
      body { padding: 20px 12px; }
      .planetary-side h3 { font-size: 1.25rem; }
      .planet-item { font-size: 0.95rem; padding: 10px 12px; }
      .planet-item .symbol { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Human Design Blueprint</h1>
    <p class="subtitle">Enter your birth data → Generate your full chart → Download & Mint as Soulbound NFT</p>

    <div class="card">
      <input type="date" id="birthDate" value="1983-08-09">
      <input type="time" id="birthTime" value="16:44">
      <input type="text" id="birthPlace" placeholder="Birth place (e.g. Sulaymaniyah)" value="Sulaymaniyah">
      <button id="generateBtn">Generate Human Design Chart</button>
    </div>

    <div id="result" class="card result">
      <h2>Your Human Design Blueprint</h2>
      
      <table id="hdTable">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody></tbody>
      </table>

      <div id="planetarySides" class="planetary-container"></div>

      <div id="richDashboard"></div>

      <div class="buttons">
        <button id="downloadImageBtn">⬇️ Download BodyGraph PNG</button>
        <button id="downloadJsonBtn">⬇️ Download Full Data (JSON)</button>
        <button id="mintBtn">✨ Mint as Soulbound NFT</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

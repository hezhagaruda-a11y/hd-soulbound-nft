<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Human Design Blueprint • Soulbound NFT</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --accent: #00ffaa;
      --text: #f0f0f0;
      --text-light: #aaaaaa;
      --border: #333;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      line-height: 1.6;
    }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    
    .subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 50px;
      font-size: 1.1rem;
    }
    
    .card {
      background: var(--card);
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    input, select {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #111;
      color: white;
      font-size: 1.1rem;
    }
    
    button {
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      width: 100%;
      transition: all 0.2s ease;
    }
    
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,255,170,0.3); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    
    th { background: #1f1f1f; font-weight: 600; }
    
    img {
      max-width: 100%;
      border-radius: 20px;
      background: #111;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    
    .result { display: none; }
    
    .planetary-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      margin: 40px 0;
    }
    
    .planetary-side {
      flex: 1;
    }
    
    .planetary-side h3 {
      margin-bottom: 20px;
      font-size: 1.3rem;
    }
    
    .planet-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      padding: 8px 12px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .planet-item:hover { background: #1f1f1f; }
    
    .planet-item span.symbol { font-size: 28px; width: 34px; }
    
    .rich-section { margin: 40px 0; }
    
    details {
      margin: 16px 0;
      background: #111;
      border-radius: 14px;
      overflow: hidden;
    }
    
    summary {
      padding: 16px 20px;
      font-weight: 600;
      cursor: pointer;
      background: #1a1a1a;
    }
    
    pre {
      background: #0a0a0a;
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
      margin: 0;
    }
    
    .buttons {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }
    
    .buttons button {
      flex: 1;
      font-size: 1.1rem;
    }
    
    @media (max-width: 900px) {
      .planetary-container { flex-direction: column; gap: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Human Design Blueprint</h1>
    <p class="subtitle">Enter your birth data → Generate your full chart → Download & Mint as Soulbound NFT</p>

    <div class="card">
      <input type="date" id="birthDate" value="1983-08-09">
      <input type="time" id="birthTime" value="16:44">
      <input type="text" id="birthPlace" placeholder="Birth place (e.g. Sulaymaniyah)" value="Sulaymaniyah">
      <button id="generateBtn">Generate Human Design Chart</button>
    </div>

    <div id="result" class="card result">
      <h2>Your Human Design Blueprint</h2>
      
      <table id="hdTable">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody></tbody>
      </table>

      <!-- Planetary Sides + BodyGraph -->
      <div id="planetarySides" class="planetary-container"></div>

      <!-- Rich Dashboard -->
      <div id="richDashboard"></div>

      <div class="buttons">
        <button id="downloadImageBtn">⬇️ Download BodyGraph PNG</button>
        <button id="downloadJsonBtn">⬇️ Download Full Data (JSON)</button>
        <button id="mintBtn">✨ Mint as Soulbound NFT</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

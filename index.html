<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://humandesignapi-production-5a7b.up.railway.app; font-src 'self';">

  <title>🌌 Human Design Blueprint • Soulbound NFT</title>
  <style>
    :root { --bg: #0a0a0a; --card: #141414; --accent: #00ffaa; --text: #f0f0f0; --text-light: #aaaaaa; --border: #333; }
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 40px 16px; 
      min-height: 100vh; 
      margin: 0; 
      overflow-x: hidden;
    }
    .container { max-width: 1280px; margin: 0 auto; overflow-x: hidden; }

    h1, .subtitle { text-align: center; }
    h1 { font-size: 2.8rem; margin-bottom: 8px; }
    .subtitle { color: var(--text-light); margin-bottom: 40px; font-size: 1.1rem; }

    .card { 
      background: var(--card); 
      padding: 28px 24px; 
      border-radius: 28px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
      margin-bottom: 32px; 
      border: 1px solid var(--border); 
      overflow: hidden;
    }

    input, select { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 16px; border: 1px solid var(--border); background: #111; color: white; font-size: 1.1rem; }
    button { padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 16px; cursor: pointer; font-size: 1.25rem; font-weight: 700; width: 100%; }

    table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1f1f1f; width: 140px; }

    img#bodygraph { 
      max-width: 100%; 
      border-radius: 24px; 
      background: #111; 
      padding: 20px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.7); 
      display: block; 
      margin: 0 auto 40px auto; 
    }

    /* PLANETARY ACTIVATIONS - STRONGLY MOBILE-FIRST */
    .planetary-container { 
      display: flex; 
      flex-direction: column; 
      gap: 48px; 
      margin: 40px 0; 
    }
    .planetary-column h3 { 
      font-size: 1.7rem; 
      margin-bottom: 24px; 
      text-align: center; 
      letter-spacing: 3px; 
    }
    .planet-row { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
      padding: 16px 20px; 
      background: rgba(255,255,255,0.06); 
      border-radius: 16px; 
      margin-bottom: 12px; 
      font-size: 1.3rem; 
    }
    .planet-row .symbol { font-size: 34px; width: 44px; text-align: center; }
    .planet-row .activation { font-weight: 600; font-size: 1.4rem; }
    .planet-row .small-plus { margin-left: auto; font-size: 34px; width: 44px; height: 44px; line-height: 34px; }

    /* Desktop only: side-by-side */
    @media (min-width: 960px) {
      .planetary-container { flex-direction: row; gap: 40px; }
      .planetary-column { max-width: 460px; }
    }

    .dashboard-levels { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 20px; 
      margin-top: 40px; 
    }
    .level-card { 
      background: #111; 
      border-radius: 20px; 
      padding: 24px; 
      border: 1px solid #222; 
      word-break: break-word; 
      overflow-wrap: break-word; 
    }
    .level-header { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 14px; }

    .buttons { display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
    .buttons button { font-size: 1.15rem; padding: 20px; }

    /* Extra safety for mobile */
    @media (max-width: 959px) {
      .level-card, .planet-row { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Human Design Blueprint</h1>
    <p class="subtitle">Enter your birth data → Generate your full chart → Explore your 6-Line Dashboard</p>

    <div class="card">
      <input type="date" id="birthDate" value="1983-08-09">
      <input type="time" id="birthTime" value="16:44">
      <input type="text" id="birthPlace" placeholder="Birth place" value="Sulaymaniyah">
      <button id="generateBtn">Generate Human Design Chart</button>
    </div>

    <div id="result" class="card result">
      <h2>Your Human Design Blueprint</h2>
      <table id="hdTable"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody></tbody></table>
      <div id="bodygraphContainer"><img id="bodygraph" alt="BodyGraph"></div>
      <div id="planetarySides" class="planetary-container"></div>
      <div id="dashboardLevels" class="dashboard-levels"></div>
      <div class="buttons">
        <button id="downloadImageBtn">⬇️ Download BodyGraph PNG</button>
        <button id="downloadJsonBtn">⬇️ Download Full Data (JSON)</button>
        <button id="mintBtn">✨ Mint as Soulbound NFT</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

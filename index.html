<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Human Design Group Intelligence</title>
  <style>
    :root { --bg: #0a0a0a; --card: #141414; --accent: #10b981; --text: #f0f0f0; --muted: #888; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .header { max-width: 1280px; margin: 0 auto 30px; text-align: center; }
    h1 { font-size: 2.8rem; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 1.1rem; }
    .tabs { display: flex; gap: 8px; max-width: 1280px; margin: 0 auto 30px; border-bottom: 2px solid #222; }
    .tab {
      padding: 14px 28px;
      background: var(--card);
      border-radius: 12px 12px 0 0;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active { background: var(--accent); color: #000; }
    .content { max-width: 1280px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }

    /* Groupenta Dashboard Styles */
    .groupenta-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 20px;
    }
    .globe { font-size: 120px; line-height: 1; }
    .groupenta-flow {
      display: flex;
      width: 100%;
      max-width: 1100px;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
    }
    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 180px;
    }
    .pillar-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 0 15px rgba(16,185,129,0.6);
      transition: all 0.3s;
    }
    .pillar-circle.inactive {
      background: #222;
      color: #666;
      box-shadow: none;
    }
    .central-pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 220px;
    }
    .central-oval {
      width: 180px;
      height: 90px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 0 15px rgba(16,185,129,0.6);
    }
    .central-oval.red { background: #ef4444; color: #fff; }
    .central-oval.green { background: #10b981; color: #000; }
    .arrow { font-size: 40px; color: #666; }
    .groupenta-label { font-size: 0.95rem; margin-top: 6px; text-align: center; line-height: 1.2; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌌 Human Design Group Intelligence</h1>
    <p class="subtitle">Enter birth data • Build your library • Unlock group &amp; penta resonance</p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="generate">Generate Blueprint</div>
    <div class="tab" data-tab="library">Library</div>
    <div class="tab" data-tab="compatibility">Group Compatibility</div>
    <div class="tab" data-tab="approved-candidates">Approved Candidates</div>
    <div class="tab" data-tab="groupenta-dashboard">Groupenta Dashboard</div>
  </div>

  <div class="content">
    <!-- Generate, Library, Compatibility, Approved Candidates tabs remain unchanged from v2.1 -->

    <!-- GROUPENTA DASHBOARD TAB -->
    <div id="groupenta-dashboard-tab" class="hidden">
      <div class="card">
        <h2 style="margin-bottom:20px;">Groupenta Dashboard</h2>
        <div id="groupentaContent" class="groupenta-container"></div>
      </div>
    </div>
  </div>

  <!-- FLOATING ACTION BUTTON – Current Global Transits -->
  <button class="fab" onclick="fetchCurrentTransits()" title="Current Global Transits">🌍</button>

  <script>
    /*
      STORY OF THIS CODE – FOUNDATION v2.2
      =====================================
      We have now reached a mature and beautiful foundation.

      Journey so far:
      - v1.0 → v1.11 : Full Group Intelligence platform
      - v2.1 : Current Global Transits floating button + full 64-gate lookup
      - v2.2 : New Groupenta Dashboard tab with corrected pillar names and exact visual emulation of your diagram

      Corrected Groupenta Pillars (as per your instructions):
      - 15-5 → Inner Flow (Reliability + Culture)
      - 46-29 → Discovery (Coordination + Commitment)
      - 14-2 → Material (Capacity + Vision) — heart and soul
      - 1-8 → Now (Implementation + Marketing/Promotions)
      - 7-31 → Pattern Fixing (Planning + Administration)
      - 13-33 → Memory Retention (Accounting + Oversight)

      The dashboard dynamically shows activation based on Approved + ON members.
      The code remains clean, self-contained, and richly documented.
    */

    const BACKEND_URL = "https://humandesignapi-production-5a7b.up.railway.app";
    const HD_API_TOKEN = "honey-lattice-2026-ubiquitous-memory-xyz789abc123";

    // Corrected Groupenta Pillars (exact as you specified)
    const PENTA_PILLARS = [
      { name: "15-5", gates: [15, 5], label: "Inner Flow" },
      { name: "46-29", gates: [46, 29], label: "Discovery" },
      { name: "14-2", gates: [14, 2], label: "Material" },
      { name: "1-8", gates: [1, 8], label: "Now" },
      { name: "7-31", gates: [7, 31], label: "Pattern Fixing" },
      { name: "13-33", gates: [13, 33], label: "Memory Retention" }
    ];

    let currentData = null;
    let savedDesigns = JSON.parse(localStorage.getItem("hdGroupDesigns") || "[]");

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        ['generate-tab','library-tab','compatibility-tab','approved-candidates-tab','groupenta-dashboard-tab'].forEach(id => 
          document.getElementById(id).classList.add('hidden')
        );
        document.getElementById(tab.dataset.tab + '-tab').classList.remove('hidden');
        if (tab.dataset.tab === 'library') renderLibrary();
        if (tab.dataset.tab === 'compatibility') renderCompatibility();
        if (tab.dataset.tab === 'approved-candidates') renderApprovedCandidates();
        if (tab.dataset.tab === 'groupenta-dashboard') renderGroupentaDashboard();
      });
    });

    // ... [All previous functions from v2.1 remain unchanged: generateBtn, renderSummary, renderPlanetarySides, createPlanetRow, save, library, compatibility, approved candidates, fetchCurrentTransits, gateLookup, etc.] ...

    // NEW: Groupenta Dashboard with your corrected pillar names
    function renderGroupentaDashboard() {
      const container = document.getElementById('groupentaContent');
      const activeDesigns = savedDesigns.filter(d => d.approved === true && d.status === "ON");

      if (activeDesigns.length === 0) {
        container.innerHTML = `<p style="text-align:center;color:#888;padding:60px;">No approved members yet.<br>Go to Approved Candidates and add designs to activate the Groupenta field.</p>`;
        return;
      }

      let allGates = new Set();
      activeDesigns.forEach(d => {
        if (d.data.gates?.prs?.Planets) d.data.gates.prs.Planets.forEach(p => allGates.add(p.Gate));
        if (d.data.gates?.des?.Planets) d.data.gates.des.Planets.forEach(p => allGates.add(p.Gate));
      });

      const activatedPillars = PENTA_PILLARS.filter(p => p.gates.every(g => allGates.has(g)));

      let html = `
        <div style="text-align:center;">
          <div class="globe">🌍</div>
          <h3 style="margin:20px 0 10px;color:var(--accent);">Groupenta Field</h3>
          <p style="color:#aaa;">${activeDesigns.length} active members</p>
        </div>

        <div class="groupenta-flow">
          <!-- Left Pillar -->
          <div class="pillar">
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Pattern Fixing") ? '' : 'inactive'}">Planning</div>
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Pattern Fixing") ? '' : 'inactive'}">Administration</div>
          </div>

          <!-- Central Flow -->
          <div class="central-pillar">
            <div class="central-oval red">Public Relations</div>
            <div class="arrow">↑</div>
            <div class="central-oval green ${activatedPillars.some(p => p.label === "Now") ? '' : 'inactive'}">Now</div>
            <div class="arrow">↑</div>
            <div class="central-oval green ${activatedPillars.some(p => p.label === "Material") ? '' : 'inactive'}">Material</div>
            <div class="arrow">↑</div>
            <div class="central-oval green ${activatedPillars.some(p => p.label === "Inner Flow") ? '' : 'inactive'}">Inner Flow</div>
          </div>

          <!-- Right Pillar -->
          <div class="pillar">
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Memory Retention") ? '' : 'inactive'}">Oversight</div>
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Memory Retention") ? '' : 'inactive'}">Accounting</div>
          </div>
        </div>

        <div style="margin-top:40px;display:flex;justify-content:center;gap:60px;flex-wrap:wrap;">
          <div class="pillar">
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Inner Flow") ? '' : 'inactive'}">Culture</div>
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Inner Flow") ? '' : 'inactive'}">Reliability</div>
          </div>
          <div class="pillar">
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Discovery") ? '' : 'inactive'}">Commitment</div>
            <div class="pillar-circle ${activatedPillars.some(p => p.label === "Discovery") ? '' : 'inactive'}">Coordination</div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    window.onload = () => {
      renderLibrary();
      renderCompatibility();
      renderApprovedCandidates();
      console.log('%c🌌 Human Design Group + Transit Foundation v2.2 – Groupenta Dashboard with your corrected pillar names', 'color:#10b981;font-weight:bold');
    };
  </script>
</body>
</html>

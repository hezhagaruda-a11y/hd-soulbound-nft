    .personality-side { color: #00ccff; }

    .design-card { background: #111; padding: 20px; border-radius: 16px; }
    .design-info { margin-bottom: 16px; }
    .library-actions { display: flex; gap: 8px; }
    .view-btn, .status-btn, .remove-btn { flex: 1; padding: 10px; font-size: 0.95rem; border-radius: 9999px; cursor: pointer; font-weight: 600; }

    .status-btn { background: #222; color: #aaa; }
    .status-btn.on { background: #10b981; color: #000; }
    .remove-btn { background: #ff4444; color: white; }

    .penta-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); }

    .groupenta-container { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 20px; }

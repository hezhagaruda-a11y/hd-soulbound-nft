<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.ethers.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://humandesignapi-production-5a7b.up.railway.app https://api.pinata.cloud;">

  <title>🌌 Design Control Dashboard • Soulbound Human Design</title>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --card: #141414; --accent: #10b981; --text: #f0f0f0; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 16px; margin: 0; overflow-x: hidden; }
    .container { max-width: 1280px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2.9rem; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 40px; }
    .card { background: var(--card); padding: 28px; border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-bottom: 32px; }
    input, select, textarea { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 16px; border: 1px solid #333; background: #111; color: white; font-size: 1.1rem; }
    button { padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 16px; cursor: pointer; font-size: 1.25rem; font-weight: 700; width: 100%; transition: all 0.3s; }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(16,185,129,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Design Control Dashboard</h1>
    <p class="subtitle">Generate → IPFS → Soulbound NFT</p>

    <div class="card">
      <h3>📌 Pinata JWT (paste once)</h3>
      <input type="password" id="pinataJWT" placeholder="eyJhbGciOi..." value="">
      <button onclick="saveJWT()">Save JWT</button>
    </div>

    <div class="card">
      <input type="date" id="birthDate" value="1983-08-09">
      <input type="time" id="birthTime" value="16:44">
      <input type="text" id="birthPlace" value="Sulaymaniyah">
      <button id="generateBtn">Generate Human Design Chart</button>
    </div>

    <div id="result" class="card" style="display:none;">
      <h2>Your Human Design Blueprint</h2>
      <table id="hdTable"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody></tbody></table>
      <img id="bodygraph" alt="BodyGraph" style="max-width:100%; border-radius:24px; margin:40px auto; display:block; background:#111; padding:20px;">

      <button id="uploadAndMintBtn" style="margin-top:12px;background:#10b981;">🌐 Upload to IPFS & Mint Soulbound NFT</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://humandesignapi-production-5a7b.up.railway.app";
    const HD_API_TOKEN = "honey-lattice-2026-ubiquitous-memory-xyz789abc123";
    const CONTRACT_ADDRESS = "0x96Bf92f275F806A543C5885B9a325D0Cc697E707";

    let currentData = null;
    let bodygraphBlob = null;

    document.getElementById("pinataJWT").value = localStorage.getItem("pinataJWT") || "";

    window.saveJWT = () => {
      const jwt = document.getElementById("pinataJWT").value.trim();
      if (jwt) {
        localStorage.setItem("pinataJWT", jwt);
        alert("✅ Pinata JWT saved!");
      }
    };

    document.getElementById("generateBtn").onclick = async () => {
      const btn = document.getElementById("generateBtn");
      btn.disabled = true; btn.textContent = "Generating...";

      const [year, month, day] = document.getElementById("birthDate").value.split("-");
      const [hour, minute] = document.getElementById("birthTime").value.split(":");
      const place = document.getElementById("birthPlace").value || "Sulaymaniyah";

      const params = new URLSearchParams({ year, month, day, hour, minute, place });

      try {
        const calcRes = await fetch(`${BACKEND_URL}/calculate?${params}`, { headers: { "Authorization": `Bearer ${HD_API_TOKEN}` } });
        const data = await calcRes.json();

        const imgRes = await fetch(`${BACKEND_URL}/bodygraph?${params}`, { headers: { "Authorization": `Bearer ${HD_API_TOKEN}` } });
        bodygraphBlob = await imgRes.blob();
        document.getElementById("bodygraph").src = URL.createObjectURL(bodygraphBlob);

        const tbody = document.querySelector("#hdTable tbody");
        tbody.innerHTML = `
          <tr><td><strong>Energy Type</strong></td><td>${data.general?.energy_type || "—"}</td></tr>
          <tr><td><strong>Strategy</strong></td><td>${data.general?.strategy || "—"}</td></tr>
          <tr><td><strong>Authority</strong></td><td>${data.general?.inner_authority || "—"}</td></tr>
          <tr><td><strong>Profile</strong></td><td>${data.general?.profile || "—"}</td></tr>
          <tr><td><strong>Incarnation Cross</strong></td><td>${data.general?.inc_cross || "—"}</td></tr>
        `;

        currentData = data;
        document.getElementById("result").style.display = "block";
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        btn.disabled = false; btn.textContent = "Generate Human Design Chart";
      }
    };

    // Reliable mint using ethers.js
    document.getElementById("uploadAndMintBtn").onclick = async () => {
      if (!currentData || !bodygraphBlob) return alert("Generate a chart first!");

      const jwt = localStorage.getItem("pinataJWT");
      if (!jwt) return alert("Please paste and save your Pinata JWT first!");

      const btn = document.getElementById("uploadAndMintBtn");
      btn.disabled = true;
      btn.textContent = "Uploading to IPFS...";

      try {
        // Upload image
        const formData = new FormData();
        formData.append("file", bodygraphBlob, "bodygraph.png");
        const imageRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
          method: "POST",
          headers: { Authorization: `Bearer ${jwt}` },
          body: formData
        });
        const imageData = await imageRes.json();
        const imageCID = imageData.IpfsHash;

        // Metadata
        const metadata = {
          name: "Soulbound Human Design Blueprint",
          description: "Permanent, non-transferable Human Design chart",
          image: `ipfs://${imageCID}`,
          attributes: currentData.general
        };

        // Upload JSON
        const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${jwt}` },
          body: JSON.stringify(metadata)
        });
        const jsonData = await jsonRes.json();
        const metadataCID = jsonData.IpfsHash;

        const ipfsURI = `ipfs://${metadataCID}`;

        // Mint with ethers.js (reliable)
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();

        const contract = new ethers.Contract(CONTRACT_ADDRESS, [
          "function mint(address to, string uri) public"
        ], signer);

        const tx = await contract.mint(await signer.getAddress(), ipfsURI);
        await tx.wait();

        btn.textContent = "✅ Minted!";
        alert(`🎉 SUCCESS!\n\nIPFS URI: ${ipfsURI}\nTx hash: ${tx.hash}`);
      } catch (e) {
        console.error(e);
        alert("Error: " + (e.message || e));
        btn.textContent = "🌐 Upload to IPFS & Mint Soulbound NFT";
      }
    };
  </script>
</body>
</html>

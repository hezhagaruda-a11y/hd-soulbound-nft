<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Human Design Blueprint • Soulbound NFT</title>
  <style>
    :root { --bg: #0a0a0a; --card: #1a1a1a; --accent: #00ffaa; --text: #f0f0f0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; margin: 0; }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2.8rem; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .card { background: var(--card); padding: 28px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 24px; }
    input, select { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-size: 16px; }
    button { padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; margin-top: 12px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #222; }
    img { max-width: 100%; border-radius: 16px; background: #111; padding: 10px; }
    .result { display: none; }
    .buttons { display: flex; gap: 12px; margin-top: 20px; }
    .buttons button { flex: 1; }
    details { margin: 15px 0; }
    summary { font-weight: bold; cursor: pointer; }
    pre { background: #111; padding: 15px; border-radius: 12px; overflow-x: auto; font-size: 13px; }
    .planetary-container { display: flex; gap: 30px; align-items: flex-start; margin: 30px 0; }
    .planetary-side { flex: 1; }
    .planetary-side h3 { margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Human Design Blueprint</h1>
    <p class="subtitle">Enter your birth data → Generate your full chart → Download & Mint as Soulbound NFT</p>

    <div class="card">
      <input type="date" id="birthDate" value="1983-08-09">
      <input type="time" id="birthTime" value="16:44">
      <input type="text" id="birthPlace" placeholder="Birth place (e.g. Sulaymaniyah)" value="Sulaymaniyah">
      <button id="generateBtn">Generate Human Design Chart</button>
    </div>

    <div id="result" class="card result">
      <h2>Your Human Design Blueprint</h2>
      
      <table id="hdTable">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody></tbody>
      </table>

      <!-- Planetary Sides + BodyGraph -->
      <div id="planetarySides" class="planetary-container"></div>

      <!-- Rich Dashboard -->
      <div id="richDashboard"></div>

      <div class="buttons">
        <button id="downloadImageBtn">⬇️ Download BodyGraph PNG</button>
        <button id="downloadJsonBtn">⬇️ Download Full Data (JSON)</button>
        <button id="mintBtn">✨ Mint as Soulbound NFT</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

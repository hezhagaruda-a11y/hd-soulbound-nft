<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Human Design Blueprint • Soulbound NFT</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --accent: #00ffaa;
      --text: #f0f0f0;
      --text-light: #aaaaaa;
      --border: #333;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      line-height: 1.6;
    }
    
    .container { max-width: 1280px; margin: 0 auto; }
    
    h1 { text-align: center; font-size: 3.2rem; margin-bottom: 8px; letter-spacing: -2px; font-weight: 700; }
    .subtitle { text-align: center; color: var(--text-light); margin-bottom: 40px; font-size: 1.15rem; }
    
    .card {
      background: var(--card);
      padding: 32px;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    input, select {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #111;
      color: white;
      font-size: 1.15rem;
    }
    
    button {
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 700;
      width: 100%;
      transition: all 0.3s ease;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,170,0.4); }
    
    table { width: 100%; border-collapse: collapse; margin: 24px 0 32px 0; }
    th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1f1f1f; font-weight: 600; width: 160px; }
    
    img {
      max-width: 100%;
      border-radius: 24px;
      background: #111;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
    
    .result { display: none; }
    
    /* 6-Line Dashboard */
    .dashboard-levels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    
    .level-card {
      background: #111;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #222;
    }

      font-weight: 700
